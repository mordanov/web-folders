name: Deploy Configs to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate-config:
    name: Validate Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          ARCHIVE_S3_ENDPOINT_URL="${ARCHIVE_S3_ENDPOINT_URL:-https://example.invalid}" \
          ARCHIVE_S3_BUCKET="${ARCHIVE_S3_BUCKET:-placeholder-archive-bucket}" \
          ARCHIVE_S3_ACCESS_KEY="${ARCHIVE_S3_ACCESS_KEY:-placeholder-access-key}" \
          ARCHIVE_S3_SECRET_KEY="${ARCHIVE_S3_SECRET_KEY:-placeholder-secret-key}" \
          docker compose -f docker-compose.yaml config > /dev/null

  deploy:
    runs-on: ubuntu-latest
    needs: [validate-config]

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_WEB_FOLDERS_DIR'" << 'EOF'

          set -e

          REPO="$1"
          REF_NAME="$2"
          WEB_FOLDERS_DIR="${3:-$HOME/web-folders}"

          git config --global --add safe.directory '*'

          PREVIOUS_COMMIT=""

          debug_dump() {
            docker compose -f docker-compose.yaml ps || true
            # Iterate every running service via the manifest-aware compose
            # rather than hardcoding service names. Adding a site no longer
            # requires editing this workflow.
            for svc in $(docker compose -f docker-compose.yaml ps --services 2>/dev/null); do
              echo "----- logs: $svc -----"
              docker compose -f docker-compose.yaml logs --no-color --tail=200 "$svc" || true
            done
          }

          mkdir -p "$WEB_FOLDERS_DIR"
          cd "$WEB_FOLDERS_DIR"

          if [ ! -d .git ]; then
            git clone "https://github.com/$REPO.git" .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          if [ ! -f ./deploy-one-db.sh ]; then
            echo "deploy-one-db.sh not found in $WEB_FOLDERS_DIR"
            exit 1
          fi

          if ! bash ./deploy-one-db.sh; then
            debug_dump
            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard "$PREVIOUS_COMMIT"
              bash ./deploy-one-db.sh || true
            fi
            exit 1
          fi

          # Ensure the landing gets recreated even if compose considers it up-to-date.
          docker compose -f docker-compose.yaml up -d --force-recreate mainpage-landing

          docker compose -f docker-compose.yaml exec -T nginx nginx -t || true
          docker compose -f docker-compose.yaml exec -T nginx nginx -s reload || true

          EOF

      - name: Deploy failed notification
        if: failure()
        run: echo "❌ Config deployment failed!"
