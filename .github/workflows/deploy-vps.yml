name: Deploy Configs to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate-config:
    name: Validate Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yaml config > /dev/null

  deploy:
    runs-on: ubuntu-latest
    needs: [validate-config]

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_WEB_FOLDERS_DIR'" << 'EOF'

          set -e

          REPO="$1"
          REF_NAME="$2"
          WEB_FOLDERS_DIR="${3:-$HOME/web-folders}"

          PREVIOUS_COMMIT=""

          debug_dump() {
            docker compose -f docker-compose.yaml ps || true
            docker compose -f docker-compose.yaml logs --no-color --tail=200 nginx || true
            docker compose -f docker-compose.yaml logs --no-color --tail=200 certbot || true
            docker compose -f docker-compose.yaml logs --no-color --tail=200 poetry-backend || true
            docker compose -f docker-compose.yaml logs --no-color --tail=200 recipes-backend || true
          }

          mkdir -p "$WEB_FOLDERS_DIR"
          cd "$WEB_FOLDERS_DIR"

          if [ ! -d .git ]; then
            git clone "https://github.com/$REPO.git" .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          if ! docker compose -f docker-compose.yaml build nginx; then
            debug_dump
            exit 1
          fi

          if ! docker compose -f docker-compose.yaml up -d nginx certbot; then
            debug_dump
            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard "$PREVIOUS_COMMIT"
              docker compose -f docker-compose.yaml build nginx || true
              docker compose -f docker-compose.yaml up -d nginx certbot || true
            fi
            exit 1
          fi

          if ! docker compose -f docker-compose.yaml exec -T nginx nginx -t; then
            debug_dump
            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard "$PREVIOUS_COMMIT"
              docker compose -f docker-compose.yaml build nginx || true
              docker compose -f docker-compose.yaml up -d nginx certbot || true
            fi
            exit 1
          fi

          docker compose -f docker-compose.yaml exec -T nginx nginx -s reload || true

          EOF

      - name: Deploy failed notification
        if: failure()
        run: echo "❌ Config deployment failed!"
