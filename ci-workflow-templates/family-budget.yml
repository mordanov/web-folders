name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-deploy-main
  cancel-in-progress: true

jobs:
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/mordanov/budget-backend:latest

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/mordanov/budget-frontend:latest
          build-args: |
            VITE_API_URL=/api/v1
            VITE_KITCHEN_API_URL=${{ vars.BUDGET_KITCHEN_API_URL }}
            VITE_KITCHEN_SERVICE_USER=${{ vars.BUDGET_KITCHEN_SERVICE_USER }}
            VITE_KITCHEN_SERVICE_PASSWORD=${{ secrets.BUDGET_KITCHEN_SERVICE_PASSWORD }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Pull and restart services
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/deploy/web-folders && \
             docker compose pull budget-backend budget-frontend && \
             docker compose up -d --no-deps budget-backend budget-frontend"
