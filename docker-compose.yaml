services:
  recipes-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RECIPES_POSTGRES_DB:-recipes}
      POSTGRES_USER: ${RECIPES_POSTGRES_USER:-recipes_user}
      POSTGRES_PASSWORD: ${RECIPES_POSTGRES_PASSWORD:-change-me-recipes-db}
      POETRY_POSTGRES_DB: ${POETRY_POSTGRES_DB:-poetry}
      POETRY_POSTGRES_USER: ${POETRY_POSTGRES_USER:-poetry_user}
      POETRY_POSTGRES_PASSWORD: ${POETRY_POSTGRES_PASSWORD:-change-me-poetry-db}
      NEWS_POSTGRES_DB: ${NEWS_POSTGRES_DB:-news}
      NEWS_POSTGRES_USER: ${NEWS_POSTGRES_USER:-news_user}
      NEWS_POSTGRES_PASSWORD: ${NEWS_POSTGRES_PASSWORD:-change-me-news-db}
      BUDGET_POSTGRES_DB: ${BUDGET_POSTGRES_DB:-budget}
      BUDGET_POSTGRES_USER: ${BUDGET_POSTGRES_USER:-budget_user}
      BUDGET_POSTGRES_PASSWORD: ${BUDGET_POSTGRES_PASSWORD:-change-me-budget-db}
      REMINDERS_POSTGRES_DB: ${REMINDERS_POSTGRES_DB:-reminders}
      REMINDERS_POSTGRES_USER: ${REMINDERS_POSTGRES_USER:-reminders_user}
      REMINDERS_POSTGRES_PASSWORD: ${REMINDERS_POSTGRES_PASSWORD:-change-me-reminders-db}
      ARCHIVE_POSTGRES_DB: ${ARCHIVE_POSTGRES_DB:-archive}
      ARCHIVE_POSTGRES_USER: ${ARCHIVE_POSTGRES_USER:-archive_user}
      ARCHIVE_POSTGRES_PASSWORD: ${ARCHIVE_POSTGRES_PASSWORD:-change-me-archive-db}
      SERVINGA_POSTGRES_DB: ${SERVINGA_POSTGRES_DB:-servinga}
      SERVINGA_POSTGRES_USER: ${SERVINGA_POSTGRES_USER:-servinga_user}
      SERVINGA_POSTGRES_PASSWORD: ${SERVINGA_POSTGRES_PASSWORD:-change-me-servinga-db}
      PORTUGUESE_EXPENSES_POSTGRES_DB: ${PORTUGUESE_EXPENSES_POSTGRES_DB:-portuguese_expenses}
      PORTUGUESE_EXPENSES_POSTGRES_USER: ${PORTUGUESE_EXPENSES_POSTGRES_USER:-portuguese_expenses_user}
      PORTUGUESE_EXPENSES_POSTGRES_PASSWORD: ${PORTUGUESE_EXPENSES_POSTGRES_PASSWORD:-change-me-portuguese-expenses-db}
      HOME_RESOURCES_POSTGRES_DB: ${HOME_RESOURCES_POSTGRES_DB:-home_resources}
      HOME_RESOURCES_POSTGRES_USER: ${HOME_RESOURCES_POSTGRES_USER:-home_resources_user}
      HOME_RESOURCES_POSTGRES_PASSWORD: ${HOME_RESOURCES_POSTGRES_PASSWORD:-change-me-home-resources-db}
      GOOGLE_TIMELINE_POSTGRES_DB: ${GOOGLE_TIMELINE_POSTGRES_DB:-google_timeline}
      GOOGLE_TIMELINE_POSTGRES_USER: ${GOOGLE_TIMELINE_POSTGRES_USER:-google_timeline_user}
      GOOGLE_TIMELINE_POSTGRES_PASSWORD: ${GOOGLE_TIMELINE_POSTGRES_PASSWORD:-change-me-google-timeline-db}
    volumes:
      - recipes_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RECIPES_POSTGRES_USER:-recipes_user} -d ${RECIPES_POSTGRES_DB:-recipes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-password-sync:
    image: postgres:16-alpine
    restart: "no"
    environment:
      RECIPES_POSTGRES_DB: ${RECIPES_POSTGRES_DB:-recipes}
      RECIPES_POSTGRES_USER: ${RECIPES_POSTGRES_USER:-recipes_user}
      RECIPES_POSTGRES_PASSWORD: ${RECIPES_POSTGRES_PASSWORD:-change-me-recipes-db}
      POETRY_POSTGRES_DB: ${POETRY_POSTGRES_DB:-poetry}
      POETRY_POSTGRES_USER: ${POETRY_POSTGRES_USER:-poetry_user}
      POETRY_POSTGRES_PASSWORD: ${POETRY_POSTGRES_PASSWORD:-change-me-poetry-db}
      NEWS_POSTGRES_DB: ${NEWS_POSTGRES_DB:-news}
      NEWS_POSTGRES_USER: ${NEWS_POSTGRES_USER:-news_user}
      NEWS_POSTGRES_PASSWORD: ${NEWS_POSTGRES_PASSWORD:-change-me-news-db}
      BUDGET_POSTGRES_DB: ${BUDGET_POSTGRES_DB:-budget}
      BUDGET_POSTGRES_USER: ${BUDGET_POSTGRES_USER:-budget_user}
      BUDGET_POSTGRES_PASSWORD: ${BUDGET_POSTGRES_PASSWORD:-change-me-budget-db}
      REMINDERS_POSTGRES_DB: ${REMINDERS_POSTGRES_DB:-reminders}
      REMINDERS_POSTGRES_USER: ${REMINDERS_POSTGRES_USER:-reminders_user}
      REMINDERS_POSTGRES_PASSWORD: ${REMINDERS_POSTGRES_PASSWORD:-change-me-reminders-db}
      ARCHIVE_POSTGRES_DB: ${ARCHIVE_POSTGRES_DB:-archive}
      ARCHIVE_POSTGRES_USER: ${ARCHIVE_POSTGRES_USER:-archive_user}
      ARCHIVE_POSTGRES_PASSWORD: ${ARCHIVE_POSTGRES_PASSWORD:-change-me-archive-db}
      SERVINGA_POSTGRES_DB: ${SERVINGA_POSTGRES_DB:-servinga}
      SERVINGA_POSTGRES_USER: ${SERVINGA_POSTGRES_USER:-servinga_user}
      SERVINGA_POSTGRES_PASSWORD: ${SERVINGA_POSTGRES_PASSWORD:-change-me-servinga-db}
      PORTUGUESE_EXPENSES_POSTGRES_DB: ${PORTUGUESE_EXPENSES_POSTGRES_DB:-portuguese_expenses}
      PORTUGUESE_EXPENSES_POSTGRES_USER: ${PORTUGUESE_EXPENSES_POSTGRES_USER:-portuguese_expenses_user}
      PORTUGUESE_EXPENSES_POSTGRES_PASSWORD: ${PORTUGUESE_EXPENSES_POSTGRES_PASSWORD:-change-me-portuguese-expenses-db}
      HOME_RESOURCES_POSTGRES_DB: ${HOME_RESOURCES_POSTGRES_DB:-home_resources}
      HOME_RESOURCES_POSTGRES_USER: ${HOME_RESOURCES_POSTGRES_USER:-home_resources_user}
      HOME_RESOURCES_POSTGRES_PASSWORD: ${HOME_RESOURCES_POSTGRES_PASSWORD:-change-me-home-resources-db}
      GOOGLE_TIMELINE_POSTGRES_DB: ${GOOGLE_TIMELINE_POSTGRES_DB:-google_timeline}
      GOOGLE_TIMELINE_POSTGRES_USER: ${GOOGLE_TIMELINE_POSTGRES_USER:-google_timeline_user}
      GOOGLE_TIMELINE_POSTGRES_PASSWORD: ${GOOGLE_TIMELINE_POSTGRES_PASSWORD:-change-me-google-timeline-db}
    volumes:
      - ./scripts/sync-app-db-users.sh:/usr/local/bin/sync-app-db-users.sh:ro
      - ./sites.yaml:/etc/web-folders/sites.yaml:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/sync-app-db-users.sh"]
    depends_on:
      recipes-db:
        condition: service_healthy

  recipes-backend:
    image: ghcr.io/mordanov/recipes-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${RECIPES_POSTGRES_USER:-recipes_user}:${RECIPES_POSTGRES_PASSWORD:-change-me-recipes-db}@recipes-db:5432/${RECIPES_POSTGRES_DB:-recipes}
      SECRET_KEY: ${RECIPES_SECRET_KEY:-change-me-recipes-secret}
      OPENAI_API_KEY: ${RECIPES_OPENAI_API_KEY:-}
      USER1_NAME: ${RECIPES_USER1_NAME:-mama}
      USER1_PASSWORD: ${RECIPES_USER1_PASSWORD:-change-me-password1}
      USER2_NAME: ${RECIPES_USER2_NAME:-papa}
      USER2_PASSWORD: ${RECIPES_USER2_PASSWORD:-change-me-password2}
      SERVICE_USER_NAME: ${RECIPES_SERVICE_USER_NAME:-kitchen_service}
      SERVICE_USER_PASSWORD: ${RECIPES_SERVICE_USER_PASSWORD:-change-me-recipes-service-password}
    volumes:
      - recipes_uploads_data:/app/uploads
      - recipes_documents_data:/app/documents
    expose:
      - "8000"
    depends_on:
      recipes-db:
        condition: service_healthy

  recipes-frontend:
    image: ghcr.io/mordanov/recipes-frontend:latest
    restart: unless-stopped
    environment:
      BACKEND_ORIGIN: http://recipes-backend:8000
    expose:
      - "3000"

  poetry-backend:
    image: ghcr.io/mordanov/poetry-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POETRY_POSTGRES_USER:-poetry_user}:${POETRY_POSTGRES_PASSWORD:-change-me-poetry-db}@recipes-db:5432/${POETRY_POSTGRES_DB:-poetry}
      SECRET_KEY: ${POETRY_SECRET_KEY:-change-me-poetry-secret}
      ADMIN_USERNAME: ${POETRY_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${POETRY_ADMIN_PASSWORD:-change-me-admin-password}
      UPLOADS_DIR: /app/data/uploads/poems
      POET_NAME: ${POETRY_POET_NAME:-Famous poet}
    volumes:
      - poetry_uploads_data:/app/data/uploads
    expose:
      - "8000"
    depends_on:
      recipes-db:
        condition: service_healthy
      db-password-sync:
        condition: service_completed_successfully

  news-backend:
    image: ghcr.io/mordanov/news-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${NEWS_POSTGRES_USER:-news_user}:${NEWS_POSTGRES_PASSWORD:-change-me-news-db}@recipes-db:5432/${NEWS_POSTGRES_DB:-news}
      SECRET_KEY: ${NEWS_SECRET_KEY:-change-me-news-secret}
      PHOTOS_DIR: /app/photos
      THUMBNAILS_DIR: /app/photos/thumbnails
      USER1_LOGIN: ${NEWS_USER1_LOGIN:-admin}
      USER1_PASSWORD: ${NEWS_USER1_PASSWORD:-change-me-password1}
      USER2_LOGIN: ${NEWS_USER2_LOGIN:-user}
      USER2_PASSWORD: ${NEWS_USER2_PASSWORD:-change-me-password2}
    volumes:
      - news_photos_data:/app/photos
    expose:
      - "8000"
    depends_on:
      recipes-db:
        condition: service_healthy
      db-password-sync:
        condition: service_completed_successfully

  news-frontend:
    image: ghcr.io/mordanov/news-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

  mainpage-landing:
    build:
      context: ./mainpage-landing
    restart: unless-stopped
    environment:
      MAINPAGE_PRIMARY_DOMAIN: ${MAINPAGE_PRIMARY_DOMAIN:-mainpage.local}
      MAINPAGE_TITLE: ${MAINPAGE_TITLE:-Mainpage}
      MAINPAGE_BROWSER_TITLE: ${MAINPAGE_BROWSER_TITLE:-}
      MAINPAGE_LINK_DOMAIN: ${MAINPAGE_LINK_DOMAIN:-}
      MAINPAGE_ENABLE_RECIPES: ${MAINPAGE_ENABLE_RECIPES:-1}
      MAINPAGE_ENABLE_REMINDERS: ${MAINPAGE_ENABLE_REMINDERS:-1}
      MAINPAGE_ENABLE_FAMILYPHOTO: ${MAINPAGE_ENABLE_FAMILYPHOTO:-1}
      MAINPAGE_ENABLE_HOME: ${MAINPAGE_ENABLE_HOME:-1}
      MAINPAGE_ENABLE_NEWS: ${MAINPAGE_ENABLE_NEWS:-1}
      MAINPAGE_ENABLE_BUDGET: ${MAINPAGE_ENABLE_BUDGET:-1}
      MAINPAGE_ENABLE_ADMIN: ${MAINPAGE_ENABLE_ADMIN:-1}
      MAINPAGE_ENABLE_TIMELINE: ${MAINPAGE_ENABLE_TIMELINE:-1}
      MAINPAGE_ENABLE_HOMERESOURCES: ${MAINPAGE_ENABLE_HOMERESOURCES:-1}
      MAINPAGE_ENABLE_EXPENSES: ${MAINPAGE_ENABLE_EXPENSES:-1}
      MAINPAGE_ENABLE_SERVINGA: ${MAINPAGE_ENABLE_SERVINGA:-1}
    expose:
      - "80"

  nginx:
    build:
      context: ./nginx
    container_name: web-folders-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      RECIPES_PRIMARY_DOMAIN: ${RECIPES_PRIMARY_DOMAIN:-recipes.local}
      RECIPES_SERVER_NAMES: ${RECIPES_SERVER_NAMES:-recipes.local}
      POETRY_PRIMARY_DOMAIN: ${POETRY_PRIMARY_DOMAIN:-poetry.local}
      POETRY_SERVER_NAMES: ${POETRY_SERVER_NAMES:-poetry.local}
      MAINPAGE_PRIMARY_DOMAIN: ${MAINPAGE_PRIMARY_DOMAIN:-mainpage.local}
      MAINPAGE_SERVER_NAMES: ${MAINPAGE_SERVER_NAMES:-mainpage.local www.mainpage.local}
      MAINPAGE_404_DOMAIN: ${MAINPAGE_404_DOMAIN:-404.mainpage.local}
      NEWS_PRIMARY_DOMAIN: ${NEWS_PRIMARY_DOMAIN:-news.mainpage.local}
      NEWS_SERVER_NAMES: ${NEWS_SERVER_NAMES:-news.mainpage.local}
      BUDGET_PRIMARY_DOMAIN: ${BUDGET_PRIMARY_DOMAIN:-budget.mainpage.local}
      BUDGET_SERVER_NAMES: ${BUDGET_SERVER_NAMES:-budget.mainpage.local}
      REMINDERS_PRIMARY_DOMAIN: ${REMINDERS_PRIMARY_DOMAIN:-reminders.mainpage.local}
      REMINDERS_SERVER_NAMES: ${REMINDERS_SERVER_NAMES:-reminders.mainpage.local}
      ADMIN_ROUTINE_PRIMARY_DOMAIN: ${ADMIN_ROUTINE_PRIMARY_DOMAIN:-admin.mainpage.local}
      ADMIN_ROUTINE_SERVER_NAMES: ${ADMIN_ROUTINE_SERVER_NAMES:-admin.mainpage.local}
      ARCHIVE_PRIMARY_DOMAIN: ${ARCHIVE_PRIMARY_DOMAIN:-archive.mainpage.local}
      ARCHIVE_SERVER_NAMES: ${ARCHIVE_SERVER_NAMES:-archive.mainpage.local}
      SERVINGA_PRIMARY_DOMAIN: ${SERVINGA_PRIMARY_DOMAIN:-servinga.mainpage.local}
      SERVINGA_SERVER_NAMES: ${SERVINGA_SERVER_NAMES:-servinga.mainpage.local}
      PORTUGUESE_EXPENSES_PRIMARY_DOMAIN: ${PORTUGUESE_EXPENSES_PRIMARY_DOMAIN:-portugal2026.mainpage.local}
      PORTUGUESE_EXPENSES_SERVER_NAMES: ${PORTUGUESE_EXPENSES_SERVER_NAMES:-portugal2026.mainpage.local}
      HOME_RESOURCES_PRIMARY_DOMAIN: ${HOME_RESOURCES_PRIMARY_DOMAIN:-home-resources.mainpage.local}
      HOME_RESOURCES_SERVER_NAMES: ${HOME_RESOURCES_SERVER_NAMES:-home-resources.mainpage.local}
      PGVIEW_PRIMARY_DOMAIN: ${PGVIEW_PRIMARY_DOMAIN:-pgview.admin.mainpage.local}
      PGVIEW_SERVER_NAMES: ${PGVIEW_SERVER_NAMES:-pgview.admin.mainpage.local}
      PGVIEW_USER: ${PGVIEW_USER:-admin}
      PGVIEW_PASSWORD: ${PGVIEW_PASSWORD:-change-me-pgview-password}
      GOOGLE_TIMELINE_PRIMARY_DOMAIN: ${GOOGLE_TIMELINE_PRIMARY_DOMAIN:-timeline.mainpage.com}
      GOOGLE_TIMELINE_SERVER_NAMES: ${GOOGLE_TIMELINE_SERVER_NAMES:-timeline.mainpage.com}
      NGINX_CERT_POLL_INTERVAL: ${NGINX_CERT_POLL_INTERVAL:-300}
    volumes:
      - ../poetry-site/frontend/templates/index.html:/srv/poetry-site/index.html:ro
      - ../poetry-site/frontend/static:/srv/poetry-site/static:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./sites.yaml:/etc/web-folders/sites.yaml:ro
    depends_on:
      - recipes-backend
      - recipes-frontend
      - poetry-backend
      - news-backend
      - news-frontend
      - mainpage-landing
      - budget-backend
      - budget-frontend
      - reminders-backend
      - reminders-frontend
      - admin-routine-backend
      - admin-routine-frontend
      - archive-backend
      - archive-frontend
      - servinga-backend
      - servinga-frontend
      - portuguese-expenses-backend
      - portuguese-expenses-frontend
      - home-resources-backend
      - home-resources-frontend
      - pgview
      - google-timeline-backend
      - google-timeline-importer
      - google-timeline-frontend

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM INT;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep "${CERTBOT_RENEW_INTERVAL_SECONDS:-43200}" &
          wait $${!};
        done
    depends_on:
      - nginx

  budget-backend:
    image: ghcr.io/mordanov/budget-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${BUDGET_POSTGRES_USER:-budget_user}:${BUDGET_POSTGRES_PASSWORD:-change-me-budget-db}@recipes-db:5432/${BUDGET_POSTGRES_DB:-budget}
      SECRET_KEY: ${BUDGET_SECRET_KEY:-change-me-budget-secret}
      ALGORITHM: ${BUDGET_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${BUDGET_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ROBOT_API_TOKENS: ${BUDGET_ROBOT_API_TOKENS:-}
      ENVIRONMENT: ${BUDGET_ENVIRONMENT:-production}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${BUDGET_MAX_UPLOAD_SIZE_MB:-10}
      ALLOWED_EXTENSIONS: ${BUDGET_ALLOWED_EXTENSIONS:-jpg,jpeg,png,gif,webp,pdf}
      ALLOWED_ORIGINS: ${BUDGET_ALLOWED_ORIGINS:-http://localhost}
      DEFAULT_USER1_NAME: ${BUDGET_DEFAULT_USER1_NAME:-User 1}
      DEFAULT_USER1_EMAIL: ${BUDGET_DEFAULT_USER1_EMAIL:-user1@family.local}
      DEFAULT_USER1_PASSWORD: ${BUDGET_DEFAULT_USER1_PASSWORD:-password1}
      DEFAULT_USER2_NAME: ${BUDGET_DEFAULT_USER2_NAME:-User 2}
      DEFAULT_USER2_EMAIL: ${BUDGET_DEFAULT_USER2_EMAIL:-user2@family.local}
      DEFAULT_USER2_PASSWORD: ${BUDGET_DEFAULT_USER2_PASSWORD:-password2}
    volumes:
      - budget_uploads_data:/app/uploads
    expose:
      - "8000"
    depends_on:
      recipes-db:
        condition: service_healthy

  budget-frontend:
    image: ghcr.io/mordanov/budget-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

  reminders-backend:
    image: ghcr.io/mordanov/reminders-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${REMINDERS_POSTGRES_USER:-reminders_user}:${REMINDERS_POSTGRES_PASSWORD:-change-me-reminders-db}@recipes-db:5432/${REMINDERS_POSTGRES_DB:-reminders}
      SECRET_KEY: ${REMINDERS_SECRET_KEY:-change-me-reminders-secret}
      SMTP_HOST: ${REMINDERS_SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${REMINDERS_SMTP_PORT:-587}
      SMTP_USER: ${REMINDERS_SMTP_USER:-}
      SMTP_PASSWORD: ${REMINDERS_SMTP_PASSWORD:-}
      SMTP_FROM: ${REMINDERS_SMTP_FROM:-reminders@app.local}
      REMINDER_CHECK_INTERVAL: ${REMINDERS_CHECK_INTERVAL:-60}
      DEFAULT_USER1_USERNAME: ${REMINDERS_DEFAULT_USER1_USERNAME:-user1}
      DEFAULT_USER1_EMAIL: ${REMINDERS_DEFAULT_USER1_EMAIL:-user1@family.local}
      DEFAULT_USER1_PASSWORD: ${REMINDERS_DEFAULT_USER1_PASSWORD:-change-me-reminders-user1-password}
      DEFAULT_USER2_USERNAME: ${REMINDERS_DEFAULT_USER2_USERNAME:-user2}
      DEFAULT_USER2_EMAIL: ${REMINDERS_DEFAULT_USER2_EMAIL:-user2@family.local}
      DEFAULT_USER2_PASSWORD: ${REMINDERS_DEFAULT_USER2_PASSWORD:-change-me-reminders-user2-password}
    expose:
      - "8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      recipes-db:
        condition: service_healthy
      db-password-sync:
        condition: service_completed_successfully

  reminders-frontend:
    image: ghcr.io/mordanov/reminders-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

  admin-routine-backend:
    image: ghcr.io/mordanov/admin-routine-backend:latest
    restart: unless-stopped
    environment:
      SECRET_KEY: ${ADMIN_ROUTINE_SECRET_KEY:-change-me-admin-routine-secret}
      ADMIN_USER1_USERNAME: ${ADMIN_ROUTINE_USER1_USERNAME:-admin1}
      ADMIN_USER1_PASSWORD: ${ADMIN_ROUTINE_USER1_PASSWORD:-change-me-admin1-password}
      ADMIN_USER2_USERNAME: ${ADMIN_ROUTINE_USER2_USERNAME:-admin2}
      ADMIN_USER2_PASSWORD: ${ADMIN_ROUTINE_USER2_PASSWORD:-change-me-admin2-password}
      RECIPES_POSTGRES_DB: ${RECIPES_POSTGRES_DB:-recipes}
      RECIPES_POSTGRES_USER: ${RECIPES_POSTGRES_USER:-recipes_user}
      RECIPES_POSTGRES_PASSWORD: ${RECIPES_POSTGRES_PASSWORD:-change-me-recipes-db}
      POETRY_POSTGRES_DB: ${POETRY_POSTGRES_DB:-poetry}
      POETRY_POSTGRES_USER: ${POETRY_POSTGRES_USER:-poetry_user}
      POETRY_POSTGRES_PASSWORD: ${POETRY_POSTGRES_PASSWORD:-change-me-poetry-db}
      NEWS_POSTGRES_DB: ${NEWS_POSTGRES_DB:-news}
      NEWS_POSTGRES_USER: ${NEWS_POSTGRES_USER:-news_user}
      NEWS_POSTGRES_PASSWORD: ${NEWS_POSTGRES_PASSWORD:-change-me-news-db}
      BUDGET_POSTGRES_DB: ${BUDGET_POSTGRES_DB:-budget}
      BUDGET_POSTGRES_USER: ${BUDGET_POSTGRES_USER:-budget_user}
      BUDGET_POSTGRES_PASSWORD: ${BUDGET_POSTGRES_PASSWORD:-change-me-budget-db}
      REMINDERS_POSTGRES_DB: ${REMINDERS_POSTGRES_DB:-reminders}
      REMINDERS_POSTGRES_USER: ${REMINDERS_POSTGRES_USER:-reminders_user}
      REMINDERS_POSTGRES_PASSWORD: ${REMINDERS_POSTGRES_PASSWORD:-change-me-reminders-db}
      ARCHIVE_POSTGRES_DB: ${ARCHIVE_POSTGRES_DB:-archive}
      ARCHIVE_POSTGRES_USER: ${ARCHIVE_POSTGRES_USER:-archive_user}
      ARCHIVE_POSTGRES_PASSWORD: ${ARCHIVE_POSTGRES_PASSWORD:-change-me-archive-db}
      PORTUGUESE_EXPENSES_POSTGRES_DB: ${PORTUGUESE_EXPENSES_POSTGRES_DB:-portuguese_expenses}
      PORTUGUESE_EXPENSES_POSTGRES_USER: ${PORTUGUESE_EXPENSES_POSTGRES_USER:-portuguese_expenses_user}
      PORTUGUESE_EXPENSES_POSTGRES_PASSWORD: ${PORTUGUESE_EXPENSES_POSTGRES_PASSWORD:-change-me-portuguese-expenses-db}
      SERVINGA_POSTGRES_DB: ${SERVINGA_POSTGRES_DB:-servinga}
      SERVINGA_POSTGRES_USER: ${SERVINGA_POSTGRES_USER:-servinga_user}
      SERVINGA_POSTGRES_PASSWORD: ${SERVINGA_POSTGRES_PASSWORD:-change-me-servinga-db}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      # Backup storage backend (local FS volume by default; switch to "s3" to
      # share family-archive's Hetzner Object Storage under a reserved prefix).
      BACKUP_STORAGE_BACKEND: ${ADMIN_ROUTINE_BACKUP_BACKEND:-local}
      BACKUP_S3_ENDPOINT_URL: ${ADMIN_ROUTINE_BACKUP_S3_ENDPOINT_URL:-${ARCHIVE_S3_ENDPOINT_URL:-}}
      BACKUP_S3_REGION: ${ADMIN_ROUTINE_BACKUP_S3_REGION:-${ARCHIVE_S3_REGION:-fsn1}}
      BACKUP_S3_BUCKET: ${ADMIN_ROUTINE_BACKUP_S3_BUCKET:-${ARCHIVE_S3_BUCKET:-}}
      BACKUP_S3_ACCESS_KEY: ${ADMIN_ROUTINE_BACKUP_S3_ACCESS_KEY:-${ARCHIVE_S3_ACCESS_KEY:-}}
      BACKUP_S3_SECRET_KEY: ${ADMIN_ROUTINE_BACKUP_S3_SECRET_KEY:-${ARCHIVE_S3_SECRET_KEY:-}}
      BACKUP_S3_PREFIX: ${ADMIN_ROUTINE_BACKUP_S3_PREFIX:-admin-routine/backups/}
      BACKUP_S3_FORCE_PATH_STYLE: ${ADMIN_ROUTINE_BACKUP_S3_FORCE_PATH_STYLE:-${ARCHIVE_S3_FORCE_PATH_STYLE:-1}}
    volumes:
      - admin_routine_backups_data:/app/backups
      - recipes_uploads_data:/mnt/recipes_uploads
      - recipes_documents_data:/mnt/recipes_documents
      - poetry_uploads_data:/mnt/poetry_uploads
      - news_photos_data:/mnt/news_photos
      - budget_uploads_data:/mnt/budget_uploads
      - archive_thumbnails_data:/mnt/archive_thumbnails

      - servinga_prometheus_data:/mnt/servinga_prometheus_data
      - portuguese_expenses_uploads_data:/mnt/portuguese_expenses_uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ci-repos.yaml:/etc/admin-routine/ci-repos.yaml:ro
