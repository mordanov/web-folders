    restart: unless-stopped
    expose:
      - "80"

  archive-backend:
    image: ghcr.io/mordanov/archive-backend:latest
    restart: unless-stopped
    deploy:
      replicas: ${ARCHIVE_REPLICAS:-2}
    environment:
      DATABASE_URL: postgresql+asyncpg://${ARCHIVE_POSTGRES_USER:-archive_user}:${ARCHIVE_POSTGRES_PASSWORD:-change-me-archive-db}@recipes-db:5432/${ARCHIVE_POSTGRES_DB:-archive}
      SECRET_KEY: ${ARCHIVE_SECRET_KEY:-change-me-archive-secret}
      COOKIE_SECURE: "1"
      COOKIE_DOMAIN: ${ARCHIVE_COOKIE_DOMAIN:-}
      SESSION_LIFETIME_DAYS: ${ARCHIVE_SESSION_LIFETIME_DAYS:-30}
      ARCHIVE_USER1_USERNAME: ${ARCHIVE_USER1_USERNAME:-user1}
      ARCHIVE_USER1_PASSWORD: ${ARCHIVE_USER1_PASSWORD:-change-me-archive-user1}
      ARCHIVE_USER2_USERNAME: ${ARCHIVE_USER2_USERNAME:-user2}
      ARCHIVE_USER2_PASSWORD: ${ARCHIVE_USER2_PASSWORD:-change-me-archive-user2}
      S3_ENDPOINT_URL: ${ARCHIVE_S3_ENDPOINT_URL:?ARCHIVE_S3_ENDPOINT_URL is required}
      S3_REGION: ${ARCHIVE_S3_REGION:-fsn1}
      S3_BUCKET: ${ARCHIVE_S3_BUCKET:?ARCHIVE_S3_BUCKET is required}
      S3_ACCESS_KEY: ${ARCHIVE_S3_ACCESS_KEY:?ARCHIVE_S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${ARCHIVE_S3_SECRET_KEY:?ARCHIVE_S3_SECRET_KEY is required}
      S3_FORCE_PATH_STYLE: ${ARCHIVE_S3_FORCE_PATH_STYLE:-1}
      MAX_FILE_SIZE_BYTES: ${ARCHIVE_MAX_FILE_SIZE_BYTES:-21474836480}
      CHUNK_SIZE_BYTES: ${ARCHIVE_CHUNK_SIZE_BYTES:-8388608}
      TRASH_RETENTION_DAYS: ${ARCHIVE_TRASH_RETENTION_DAYS:-30}
      THUMBNAIL_DIR: ${ARCHIVE_THUMBNAIL_DIR:-/app/data/thumbnails}
      THUMBNAIL_WORKER_COUNT: ${ARCHIVE_THUMBNAIL_WORKER_COUNT:-2}
      DB_POOL_SIZE: ${ARCHIVE_DB_POOL_SIZE:-10}
      DB_POOL_OVERFLOW: ${ARCHIVE_DB_POOL_OVERFLOW:-10}
      ALLOWED_ORIGINS: ${ARCHIVE_ALLOWED_ORIGINS:-https://${ARCHIVE_PRIMARY_DOMAIN:-archive.mainpage.local}}
      LOG_LEVEL: ${ARCHIVE_LOG_LEVEL:-INFO}
    volumes:
      - archive_thumbnails_data:/app/data/thumbnails
    expose:
      - "8000"
    depends_on:
      recipes-db:
        condition: service_healthy
      db-password-sync:
        condition: service_completed_successfully

  archive-frontend:
    image: ghcr.io/mordanov/archive-frontend:latest
    restart: unless-stopped
    expose:
      - "80"


  servinga-prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../servinga-monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - servinga_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.enable-lifecycle"

  servinga-backend:
    image: ghcr.io/mordanov/servinga-backend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROMETHEUS_URL: http://host.docker.internal:9090
      PROMETHEUS_FALLBACK_URLS: http://gateway.docker.internal:9090
      NO_PROXY: localhost,127.0.0.1,host.docker.internal
      no_proxy: localhost,127.0.0.1,host.docker.internal
      DATABASE_URL: postgresql+asyncpg://${SERVINGA_POSTGRES_USER:-servinga_user}:${SERVINGA_POSTGRES_PASSWORD:-change-me-servinga-db}@recipes-db:5432/${SERVINGA_POSTGRES_DB:-servinga}
    expose:
      - "8000"
    depends_on:
      recipes-db:
        condition: service_healthy
      db-password-sync:
        condition: service_completed_successfully
      servinga-prometheus:
        condition: service_started

  servinga-frontend:
    image: ghcr.io/mordanov/servinga-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

