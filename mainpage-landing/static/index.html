<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__MAINPAGE_BROWSER_TITLE__</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --ring: #dbe3f3;
      --ring-hover: #c3d4f7;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
      color: var(--text);
      padding: 24px;
    }

    .lang-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--ring);
      border-radius: 12px;
      padding: 8px 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .lang-switcher label {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }

    .lang-switcher select {
      border: 1px solid var(--ring);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 4px 8px;
      font-size: 0.9rem;
    }

    .container {
      width: min(760px, 100%);
      text-align: center;
    }

    h1 {
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      margin: 0 0 24px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .tile {
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--ring);
      border-radius: 16px;
      min-height: 150px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
      box-shadow: var(--shadow);
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      border-color: var(--ring-hover);
      box-shadow: 0 14px 28px rgba(59, 130, 246, 0.18);
      outline: none;
    }

    .tile img {
      width: 58px;
      height: 58px;
    }

    .tile span {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
    }

    .tile.disabled {
      cursor: not-allowed;
      opacity: 0.92;
    }

    .tile.disabled:hover,
    .tile.disabled:focus-visible {
      transform: none;
      border-color: var(--ring);
      box-shadow: var(--shadow);
      outline: none;
    }

    .tile.disabled img {
      filter: grayscale(1);
      opacity: 0.72;
    }

    .tile.disabled span {
      color: #6b7280;
    }

    .tile.placeholder {
      cursor: default;
      border-style: dashed;
      background: #f8fafc;
      box-shadow: none;
    }

    .tile.placeholder:hover,
    .tile.placeholder:focus-visible {
      transform: none;
      border-color: var(--ring);
      box-shadow: none;
      outline: none;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .lang-switcher {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="lang-switcher">
    <label for="lang-select" data-i18n-text="languageLabel">Язык</label>
    <select id="lang-select" title="Выбрать язык" data-i18n-title="languageSelectTooltip" aria-label="Выбор языка">
      <option value="ru">Русский</option>
      <option value="en">English</option>
      <option value="fr">Francais</option>
      <option value="es">Espanol</option>
    </select>
  </div>

  <main class="container">
    <h1 data-i18n-text="pageTitle">__MAINPAGE_TITLE__</h1>
    <div class="grid">
      <a class="tile __RECIPES_LINK_CLASS__" href="__RECIPES_LINK_HREF__" title="__RECIPES_LINK_TITLE__" data-i18n-enabled-title="recipesTooltip" aria-disabled="__RECIPES_LINK_ARIA_DISABLED__" tabindex="__RECIPES_LINK_TABINDEX__">
        <img src="/icons/miveralta_recipes.png" alt="Рецепты нашей семьи" data-i18n-alt="recipesLabel">
        <span data-i18n-text="recipesLabel">Рецепты нашей семьи</span>
      </a>
      <a class="tile __REMINDERS_LINK_CLASS__" href="__REMINDERS_LINK_HREF__" title="__REMINDERS_LINK_TITLE__" data-i18n-enabled-title="remindersTooltip" aria-disabled="__REMINDERS_LINK_ARIA_DISABLED__" tabindex="__REMINDERS_LINK_TABINDEX__">
        <img src="/icons/miveralta_notifications.png" alt="Напоминания" data-i18n-alt="remindersLabel">
        <span data-i18n-text="remindersLabel">Напоминания</span>
      </a>
      <a class="tile __FAMILYPHOTO_LINK_CLASS__" href="__FAMILYPHOTO_LINK_HREF__" title="__FAMILYPHOTO_LINK_TITLE__" data-i18n-enabled-title="archiveTooltip" aria-disabled="__FAMILYPHOTO_LINK_ARIA_DISABLED__" tabindex="__FAMILYPHOTO_LINK_TABINDEX__">
        <img src="/icons/miveralta_familyphotos.png" alt="Семейный архив" data-i18n-alt="archiveLabel">
        <span data-i18n-text="archiveLabel">Семейный архив</span>
      </a>
      <a class="tile __HOME_LINK_CLASS__" href="__HOME_LINK_HREF__" title="__HOME_LINK_TITLE__" data-i18n-enabled-title="homeTooltip" aria-disabled="__HOME_LINK_ARIA_DISABLED__" tabindex="__HOME_LINK_TABINDEX__">
        <img src="/icons/miveralta_smarthome.png" alt="Умный дом" data-i18n-alt="homeLabel">
        <span data-i18n-text="homeLabel">Умный дом</span>
      </a>
      <a class="tile __NEWS_LINK_CLASS__" href="__NEWS_LINK_HREF__" title="__NEWS_LINK_TITLE__" data-i18n-enabled-title="newsTooltip" aria-disabled="__NEWS_LINK_ARIA_DISABLED__" tabindex="__NEWS_LINK_TABINDEX__">
        <img src="/icons/miveralta_news.png" alt="Лента новостей" data-i18n-alt="newsLabel">
        <span data-i18n-text="newsLabel">Лента новостей</span>
      </a>
      <a class="tile __BUDGET_LINK_CLASS__" href="__BUDGET_LINK_HREF__" title="__BUDGET_LINK_TITLE__" data-i18n-enabled-title="budgetTooltip" aria-disabled="__BUDGET_LINK_ARIA_DISABLED__" tabindex="__BUDGET_LINK_TABINDEX__">
        <img src="/icons/miveralta_budget.png" alt="Бюджет семьи" data-i18n-alt="budgetLabel">
        <span data-i18n-text="budgetLabel">Бюджет семьи</span>
      </a>
    </div>
  </main>

  <script>
    const i18n = {
      ru: {
        htmlLang: "ru",
        pageTitle: "Главная страница",
        languageLabel: "Язык",
        languageSelectTooltip: "Выбрать язык",
        serviceUnavailableTooltip: "В разработке",
        recipesLabel: "Рецепты нашей семьи",
        recipesTooltip: "Открыть рецепты нашей семьи",
        remindersLabel: "Напоминания",
        remindersTooltip: "Открыть напоминания",
        archiveLabel: "Семейный архив",
        archiveTooltip: "Открыть семейный архив",
        homeLabel: "Умный дом",
        homeTooltip: "Открыть умный дом",
        newsLabel: "Лента новостей",
        newsTooltip: "Открыть ленту новостей",
        budgetLabel: "Бюджет семьи",
        budgetTooltip: "Открыть бюджет семьи",
        soonLabel: "Скоро"
      },
      en: {
        htmlLang: "en",
        pageTitle: "Main Page",
        languageLabel: "Language",
        languageSelectTooltip: "Choose language",
        serviceUnavailableTooltip: "In development",
        recipesLabel: "Family Recipes",
        recipesTooltip: "Open family recipes",
        remindersLabel: "Reminders",
        remindersTooltip: "Open reminders",
        archiveLabel: "Family Archive",
        archiveTooltip: "Open family archive",
        homeLabel: "Smart Home",
        homeTooltip: "Open smart home",
        newsLabel: "News Feed",
        newsTooltip: "Open news feed",
        budgetLabel: "Family Budget",
        budgetTooltip: "Open family budget",
        soonLabel: "Coming soon"
      },
      fr: {
        htmlLang: "fr",
        pageTitle: "Page principale",
        languageLabel: "Langue",
        languageSelectTooltip: "Choisir la langue",
        serviceUnavailableTooltip: "En developpement",
        recipesLabel: "Recettes de famille",
        recipesTooltip: "Ouvrir les recettes de famille",
        remindersLabel: "Rappels",
        remindersTooltip: "Ouvrir les rappels",
        archiveLabel: "Archives familiales",
        archiveTooltip: "Ouvrir les archives familiales",
        homeLabel: "Maison intelligente",
        homeTooltip: "Ouvrir la maison intelligente",
        newsLabel: "Fil d'actualites",
        newsTooltip: "Ouvrir le fil d'actualites",
        budgetLabel: "Budget familial",
        budgetTooltip: "Ouvrir le budget familial",
        soonLabel: "Bientot"
      },
      es: {
        htmlLang: "es",
        pageTitle: "Pagina principal",
        languageLabel: "Idioma",
        languageSelectTooltip: "Elegir idioma",
        serviceUnavailableTooltip: "En desarrollo",
        recipesLabel: "Recetas familiares",
        recipesTooltip: "Abrir recetas familiares",
        remindersLabel: "Recordatorios",
        remindersTooltip: "Abrir recordatorios",
        archiveLabel: "Archivo familiar",
        archiveTooltip: "Abrir archivo familiar",
        homeLabel: "Casa inteligente",
        homeTooltip: "Abrir casa inteligente",
        newsLabel: "Noticias",
        newsTooltip: "Abrir noticias",
        budgetLabel: "Presupuesto familiar",
        budgetTooltip: "Abrir presupuesto familiar",
        soonLabel: "Proximamente"
      }
    };

    const select = document.getElementById("lang-select");
    const supportedLanguages = ["ru", "en", "fr", "es"];

    function normalizeLanguageCode(languageCode) {
      if (!languageCode || typeof languageCode !== "string") {
        return "ru";
      }
      const baseCode = languageCode.toLowerCase().split("-")[0];
      return supportedLanguages.includes(baseCode) ? baseCode : "ru";
    }

    function detectBrowserLanguage() {
      const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length
        ? navigator.languages
        : [navigator.language];

      for (const lang of browserLanguages) {
        const normalized = normalizeLanguageCode(lang);
        if (supportedLanguages.includes(normalized)) {
          return normalized;
        }
      }

      return "ru";
    }

    function applyLanguage(languageCode) {
      const selectedLanguage = i18n[languageCode] ? languageCode : "ru";
      const dict = i18n[selectedLanguage];

      document.documentElement.lang = dict.htmlLang;
      document.title = dict.pageTitle;

      document.querySelectorAll("[data-i18n-text]").forEach((element) => {
        const key = element.getAttribute("data-i18n-text");
        if (dict[key]) {
          element.textContent = dict[key];
        }
      });

      document.querySelectorAll("[data-i18n-title]").forEach((element) => {
        const key = element.getAttribute("data-i18n-title");
        if (dict[key]) {
          element.setAttribute("title", dict[key]);
        }
      });

      document.querySelectorAll("[data-i18n-enabled-title]").forEach((element) => {
        const enabledKey = element.getAttribute("data-i18n-enabled-title");
        const isDisabled = element.getAttribute("aria-disabled") === "true";
        const titleValue = isDisabled ? dict.serviceUnavailableTooltip : dict[enabledKey];
        if (titleValue) {
          element.setAttribute("title", titleValue);
        }
      });

      document.querySelectorAll("[data-i18n-alt]").forEach((element) => {
        const key = element.getAttribute("data-i18n-alt");
        if (dict[key]) {
          element.setAttribute("alt", dict[key]);
        }
      });

      select.setAttribute("aria-label", dict.languageSelectTooltip);
      localStorage.setItem("mainpage-language", selectedLanguage);
    }

    const savedLanguage = localStorage.getItem("mainpage-language");
    const initialLanguage = savedLanguage
      ? normalizeLanguageCode(savedLanguage)
      : detectBrowserLanguage();
    select.value = initialLanguage;
    applyLanguage(initialLanguage);

    select.addEventListener("change", (event) => {
      applyLanguage(event.target.value);
    });
  </script>
</body>
</html>
